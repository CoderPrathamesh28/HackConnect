{% extends "layout.html" %}

{% block content %}
<div class="auth-container mt-4">
    <h1 class="auth-title">Create an Account</h1>
    <form method="post">
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" name="name" id="name" class="form-control" placeholder="John Doe" required>
        </div>
        
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" name="email" id="email" class="form-control" placeholder="john@example.com" required>
        </div>
        
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" name="password" id="password" class="form-control" required>
        </div>
        
        <button type="submit" class="btn btn-gradient" style="width: 100%;">Sign Up</button>
    </form>
    <p class="text-center mt-4">Already have an account? <a href="{{ url_for('login') }}" style="color:var(--primary-color)">Log in</a></p>
</div>
{% endblock %}
