{% extends "layout.html" %}

{% block content %}
<div class="auth-container mt-4" style="max-width: 600px;">
    <h1 class="auth-title">Get in Touch</h1>
    <p class="text-center text-muted form-group">Have a question or need help organizing a hackathon? Reach out to our team.</p>
    
    <form method="post">
        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" name="name" id="name" class="form-control" value="{{ g.user.name if g.user else '' }}" required>
        </div>
        
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" name="email" id="email" class="form-control" value="{{ g.user.email if g.user else '' }}" required>
        </div>
        
        <div class="form-group">
            <label for="subject">Subject</label>
            <select name="subject" id="subject" class="form-control">
                <option value="general">General Inquiry</option>
                <option value="organizer">I want to organize a hackathon</option>
                <option value="support">Technical Support</option>
                <option value="feedback">Feedback</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="message">Message</label>
            <textarea name="message" id="message" class="form-control" rows="6" required></textarea>
        </div>
        
        <button type="submit" class="btn btn-gradient" style="width: 100%;"><i class="fa-solid fa-paper-plane" style="margin-right: 0.5rem;"></i> Send Message</button>
    </form>

    <div style="margin-top: 2.5rem; text-align: center; border-top: 1px solid var(--border-color); padding-top: 1.5rem;">
        <p style="color: var(--text-muted); margin-bottom: 1rem; font-size: 0.9rem;">Connect with us on</p>
        <div style="display: flex; justify-content: center; gap: 2rem;">
            <a href="https://www.instagram.com/coder_prathamesh/" target="_blank" style="color: #E1306C; font-size: 1.5rem; transition: transform 0.3s;" onmouseover="this.style.transform='scale(1.2)'" onmouseout="this.style.transform='scale(1)'">
                <i class="fa-brands fa-instagram"></i>
            </a>
            
            <a href="https://www.linkedin.com/in/coderprathamesh/" target="_blank" style="color: #0077b5; font-size: 1.5rem; transition: transform 0.3s;" onmouseover="this.style.transform='scale(1.2)'" onmouseout="this.style.transform='scale(1)'">
                <i class="fa-brands fa-linkedin"></i>
            </a>
            
            <a href="https://github.com/CoderPrathamesh28" target="_blank" style="color: var(--text-color); font-size: 1.5rem; transition: transform 0.3s;" onmouseover="this.style.transform='scale(1.2)'" onmouseout="this.style.transform='scale(1)'">
                <i class="fa-brands fa-github"></i>
            </a>
        </div>
    </div>
</div>
{% endblock %}
