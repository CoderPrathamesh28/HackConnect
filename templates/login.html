{% extends "layout.html" %}

{% block content %}
<div class="auth-container mt-4">
    <h1 class="auth-title">Welcome Back</h1>
    <form method="post">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" name="email" id="email" class="form-control" placeholder="john@example.com" required>
        </div>
        
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" name="password" id="password" class="form-control" required>
        </div>
        
        <button type="submit" class="btn btn-gradient" style="width: 100%;">Log In</button>
    </form>
    <p class="text-center mt-4">Don't have an account? <a href="{{ url_for('register') }}" style="color:var(--gradient-start)">Sign up</a></p>
</div>
{% endblock %}
