{% extends "layout.html" %}

{% block content %}
<div style="margin-top: 2rem; display: flex; gap: 2rem; flex-wrap: wrap;">
    
    <div style="flex: 1; min-width: 300px;">
        <div style="background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem;">
            <h2 style="font-size: 1.8rem; margin-bottom: 0.5rem; color: var(--gradient-end);">Team: {{ team.name }}</h2>
            <p style="color: var(--text-muted); margin-bottom: 1.5rem;">Hackathon: <strong>{{ team.hackathon_title }}</strong></p>
            
            <h3 style="font-size: 1.2rem; margin-bottom: 1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem;">Members</h3>
            <ul style="list-style: none;">
                {% for member in members %}
                <li style="padding: 0.5rem 0; display: flex; align-items: center; gap: 0.5rem;">
                    <i class="fa-solid fa-user-circle" style="color: var(--primary-color); font-size: 1.5rem;"></i>
                    <div>
                        <div style="font-weight: bold;">{{ member.name }}</div>
                        <div style="font-size: 0.8rem; color: var(--text-muted);">{{ member.email }}</div>
                    </div>
                </li>
                {% endfor %}
            </ul>
        </div>
    </div>

    <div style="flex: 2; min-width: 300px;">
        <div style="background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 1.5rem;">
            <h2 style="font-size: 1.8rem; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem;">
                <i class="fa-solid fa-rocket" style="color: var(--primary-color);"></i> Project Submission
            </h2>
            
            <form method="post">
                <div class="form-group">
                    <label for="title">Project Title <span style="color: #ff758c;">*</span></label>
                    <input type="text" name="title" id="title" class="form-control" value="{{ submission.title if submission else '' }}" required>
                </div>
                
                <div class="form-group">
                    <label for="description">Description <span style="color: #ff758c;">*</span></label>
                    <textarea name="description" id="description" class="form-control" rows="5" required>{{ submission.description if submission else '' }}</textarea>
                </div>
                
                <div class="form-group">
                    <label for="github_link">GitHub Link</label>
                    <input type="url" name="github_link" id="github_link" class="form-control" value="{{ submission.github_link if submission else '' }}" placeholder="https://github.com/...">
                </div>
                
                <div class="form-group">
                    <label for="demo_video">Demo Video Link</label>
                    <input type="url" name="demo_video" id="demo_video" class="form-control" value="{{ submission.demo_video if submission else '' }}" placeholder="YouTube, Loom, etc.">
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: auto;"><i class="fa-solid fa-cloud-arrow-up" style="margin-right: 0.5rem;"></i> {% if submission %}Update Submission{% else %}Submit Project{% endif %}</button>
            </form>
        </div>
    </div>

</div>
{% endblock %}
