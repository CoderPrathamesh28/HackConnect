{% extends "layout.html" %}

{% block content %}
<div class="auth-container mt-4" style="max-width: 800px;">
    <h1 class="auth-title">Host a New Hackathon</h1>
    <p style="text-align: center; color: var(--text-muted); margin-bottom: 2rem;">Fill in the details below to launch your event on HackConnect.</p>

    <form method="post">
        <div class="form-group">
            <label for="title">Hackathon Title</label>
            <input type="text" name="title" id="title" class="form-control" required placeholder="e.g. Innovate AI 2026">
        </div>
        
        <div class="form-group">
            <label for="description">Description</label>
            <textarea name="description" id="description" class="form-control" rows="5" required placeholder="Describe the goal, theme, and rules..."></textarea>
        </div>

        <div style="display: flex; gap: 1.5rem; flex-wrap: wrap;">
            <div class="form-group" style="flex: 1; min-width: 250px;">
                <label for="start_date">Start Date</label>
                <input type="date" name="start_date" id="start_date" class="form-control" required>
            </div>
            <div class="form-group" style="flex: 1; min-width: 250px;">
                <label for="end_date">End Date</label>
                <input type="date" name="end_date" id="end_date" class="form-control" required>
            </div>
        </div>

        <div style="display: flex; gap: 1.5rem; flex-wrap: wrap;">
            <div class="form-group" style="flex: 1; min-width: 250px;">
                <label for="theme">Theme (Optional)</label>
                <input type="text" name="theme" id="theme" class="form-control" placeholder="e.g. Healthcare, Web3, open-ended...">
            </div>
            
            <div class="form-group" style="flex: 1; min-width: 250px;">
                <label for="prizes">Prizes (Optional)</label>
                <input type="text" name="prizes" id="prizes" class="form-control" placeholder="e.g. 1st: $500, 2nd: $200">
            </div>
        </div>

        <button type="submit" class="btn btn-gradient" style="width: 100%; margin-top: 1rem;"><i class="fa-solid fa-rocket" style="margin-right: 0.5rem;"></i> Launch Hackathon</button>
    </form>
</div>
{% endblock %}
