{% extends "layout.html" %}

{% block content %}
<div class="auth-container mt-4" style="max-width: 800px;">
    <h1 class="auth-title">Edit Hackathon</h1>
    <p style="text-align: center; color: var(--text-muted); margin-bottom: 2rem;">Update the details for {{ hackathon.title }}</p>

    <form method="post">
        <div class="form-group">
            <label for="title">Hackathon Title</label>
            <input type="text" name="title" id="title" class="form-control" value="{{ hackathon.title }}" required>
        </div>
        
        <div class="form-group">
            <label for="description">Description</label>
            <textarea name="description" id="description" class="form-control" rows="5" required>{{ hackathon.description }}</textarea>
        </div>

        <div style="display: flex; gap: 1.5rem; flex-wrap: wrap;">
            <div class="form-group" style="flex: 1; min-width: 250px;">
                <label for="start_date">Start Date</label>
                <input type="date" name="start_date" id="start_date" class="form-control" value="{{ hackathon.start_date }}" required>
            </div>
            <div class="form-group" style="flex: 1; min-width: 250px;">
                <label for="end_date">End Date</label>
                <input type="date" name="end_date" id="end_date" class="form-control" value="{{ hackathon.end_date }}" required>
            </div>
        </div>

        <div class="form-group">
            <label for="theme">Theme (Optional)</label>
            <input type="text" name="theme" id="theme" class="form-control" value="{{ hackathon.theme }}">
        </div>
        
        <div class="form-group">
            <label for="prizes">Prizes (Optional)</label>
            <input type="text" name="prizes" id="prizes" class="form-control" value="{{ hackathon.prizes if hackathon.prizes else '' }}">
        </div>

        <div class="form-group">
            <label for="status">Status</label>
            <select name="status" id="status" class="form-control">
                <option value="upcoming" {% if hackathon.status == 'upcoming' %}selected{% endif %}>Upcoming</option>
                <option value="active" {% if hackathon.status == 'active' %}selected{% endif %}>Active</option>
                <option value="closed" {% if hackathon.status == 'closed' %}selected{% endif %}>Closed</option>
            </select>
        </div>

        <div style="display: flex; gap: 1rem; margin-top: 1rem;">
            <a href="{{ url_for('admin') }}" class="btn" style="flex: 1; text-align: center; background: var(--bg-color); color: var(--text-color); border: 1px solid var(--border-color);">Cancel</a>
            <button type="submit" class="btn btn-primary" style="flex: 2;"><i class="fa-solid fa-floppy-disk" style="margin-right: 0.5rem;"></i> Save Changes</button>
        </div>
    </form>
</div>
{% endblock %}
